<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Suivi Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --primary: #007bff; --bg: #f8f9fa; }
        body { background: var(--bg); font-family: sans-serif; padding-bottom: 50px; }
        .stat-card { background: white; border-radius: 15px; padding: 15px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); height: 100%; }
        .stat-card small { color: #6c757d; font-weight: bold; font-size: 0.7rem; text-transform: uppercase; }
        .stat-card div { font-size: 1.4rem; font-weight: bold; margin: 5px 0; }
        .delta-tag { font-size: 0.7rem !important; padding: 2px 8px; border-radius: 10px; display: inline-block; font-weight: bold; }
        .delta-neg { background: #f8d7da; color: #a94442; }
        .delta-pos { background: #d4edda; color: #155724; }
        .salary-banner { background: linear-gradient(135deg, #2c3e50, #4ca1af); color: white; border-radius: 15px; padding: 20px; text-align: center; margin: 15px 0; }
        .week-separator { background: #e9ecef; padding: 8px 15px; font-weight: bold; font-size: 0.85rem; color: #495057; margin: 15px -15px 10px -15px; display: flex; justify-content: space-between; }
        .edit-mode { background-color: #fff3cd !important; border: 2px solid #ffc107 !important; }
        .friday-alert { background-color: #fd7e14 !important; border-color: #fd7e14 !important; }
    </style>
</head>
<body>
    <div class="container py-3">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="m-0 text-primary fw-bold"><i class="bi bi-clock-history"></i> Suivi Pro</h5>
            <div>
                <button onclick="exportJSON()" class="btn btn-sm btn-outline-primary"><i class="bi bi-cloud-download"></i></button>
                <button onclick="importJSON()" class="btn btn-sm btn-outline-secondary"><i class="bi bi-cloud-upload"></i></button>
                <button onclick="exportToPDF()" class="btn btn-sm btn-dark"><i class="bi bi-file-earmark-pdf"></i></button>
                <input type="file" id="importFile" style="display:none" onchange="handleImport(this)">
            </div>
        </div>

        <div class="card p-2 mb-3 shadow-sm border-0">
            <div class="d-flex justify-content-between align-items-center">
                <button onclick="changeMonth(-1)" class="btn btn-link btn-sm text-dark"><i class="bi bi-chevron-left"></i></button>
                <span id="current-view-label" class="fw-bold text-uppercase">CHARGEMENT...</span>
                <button onclick="changeMonth(1)" class="btn btn-link btn-sm text-dark"><i class="bi bi-chevron-right"></i></button>
            </div>
        </div>

        <div class="row g-2 mb-3">
            <div class="col-6">
                <div class="stat-card">
                    <small>Total Mois</small>
                    <div id="month-hours">0h00</div>
                    <div id="month-delta-ui"></div>
                </div>
            </div>
            <div class="col-6">
                <div class="stat-card">
                    <small id="week-label">Semaine --</small>
                    <div id="current-week-hours">0h00</div>
                    <div id="current-week-delta-ui"></div>
                </div>
            </div>
        </div>

        <div class="salary-banner shadow-sm">
            <small class="text-uppercase opacity-75">Salaire Net Estimé (Cliquez)</small>
            <div id="net-salary" class="display-6 fw-bold">0,00 €</div>
        </div>

        <div id="form-card" class="card p-3 shadow-sm border-0 mb-4">
            <input type="hidden" id="edit-id">
            <div class="row g-2">
                <div class="col-7">
                    <label class="small fw-bold text-muted text-uppercase">Date</label>
                    <input type="date" id="date" class="form-control" onchange="checkDayType()">
                </div>
                <div class="col-5">
                    <label class="small fw-bold text-muted text-uppercase">Type</label>
                    <select id="day-type" class="form-select" onchange="checkDayType()">
                        <option value="work">💻 Travail</option>
                        <option value="conge">🌴 Congé</option>
                        <option value="maladie">🤒 Maladie</option>
                        <option value="rtt">🕒 RTT</option>
                    </select>
                </div>
                <div class="col-12" id="chantier-div">
                    <label class="small fw-bold text-muted text-uppercase">Nom du chantier</label>
                    <input type="text" id="chantier" class="form-control" placeholder="Lieu ou client">
                </div>
                <div id="work-inputs" class="row g-2 m-0 p-0">
                    <div class="col-4">
                        <label class="small fw-bold text-muted text-uppercase">Début</label>
                        <input type="text" id="start" class="form-control" placeholder="Ex: 800">
                    </div>
                    <div class="col-4">
                        <label class="small fw-bold text-muted text-uppercase">Fin</label>
                        <input type="text" id="end" class="form-control" placeholder="Ex: 1730">
                    </div>
                    <div class="col-4">
                        <label class="small fw-bold text-muted text-uppercase">Pause (min)</label>
                        <input type="number" id="break" class="form-control" value="45">
                    </div>
                </div>
                <div class="col-12 mt-3">
                    <button onclick="saveSession()" id="btn-save" class="btn btn-primary w-100 fw-bold py-2">Enregistrer</button>
                </div>
            </div>
        </div>

        <div id="history"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
